x-app-env: &app-env
  NODE_ENV: production
  NEXT_PUBLIC_SITE_URL: http://localhost:3000
  DATABASE_URL: postgresql://middleware:middleware@postgres:5432/middleware?sslmode=disable
  POSTGRES_URL: postgresql://middleware:middleware@postgres:5432/middleware?sslmode=disable
  PRISMA_DATABASE_URL: postgresql://middleware:middleware@postgres:5432/middleware?sslmode=disable
  BETTER_AUTH_SECRET: local-docker-secret-change-me-32-characters-minimum
  BETTER_AUTH_URL: http://localhost:3000
  BOOTSTRAP_ADMIN_EMAIL: admin@example.com
  BOOTSTRAP_ADMIN_PASSWORD: replace-with-at-least-8-characters
  BOOTSTRAP_ADMIN_NAME: Admin
  AUDIT_LOG_RETENTION_DAYS: 365
  REDIS_URL: redis://redis:6379/0
  BLOB_READ_WRITE_TOKEN: local-docker-placeholder
  CMS_MEDIA_BLOB_ACCESS: private
  S3_ENDPOINT: http://minio:9000
  S3_PUBLIC_ENDPOINT: http://localhost:9000
  S3_REGION: eu-central-1
  S3_BUCKET: middleware-media
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin
  S3_FORCE_PATH_STYLE: "true"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: middleware
      POSTGRES_USER: middleware
      POSTGRES_PASSWORD: middleware
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U middleware -d middleware"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 2
        done
        mc mb --ignore-existing local/middleware-media

  migrate:
    build:
      context: .
      target: builder
    command: pnpm prisma:migrate:deploy
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    environment: *app-env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
  minio-data:
