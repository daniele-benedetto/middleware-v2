x-app-env: &app-env
  NODE_ENV: production
  NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
  BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-local-production-secret-change-me-32-characters}
  DATABASE_URL: postgresql://${POSTGRES_USER:-middleware}:${POSTGRES_PASSWORD:-middleware}@postgres:5432/middleware?sslmode=disable
  POSTGRES_URL: postgresql://${POSTGRES_USER:-middleware}:${POSTGRES_PASSWORD:-middleware}@postgres:5432/middleware?sslmode=disable
  PRISMA_DATABASE_URL: postgresql://${POSTGRES_USER:-middleware}:${POSTGRES_PASSWORD:-middleware}@postgres:5432/middleware?sslmode=disable
  REDIS_URL: redis://redis:6379/0
  AUDIT_LOG_RETENTION_DAYS: ${AUDIT_LOG_RETENTION_DAYS:-365}
  BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
  BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-replace-with-at-least-8-characters}
  BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Admin}
  CMS_MEDIA_BLOB_ACCESS: ${CMS_MEDIA_BLOB_ACCESS:-private}
  S3_ENDPOINT: ${PROD_LOCAL_S3_ENDPOINT:-http://host.docker.internal:9000}
  S3_REGION: ${PROD_LOCAL_S3_REGION:-eu-central-1}
  S3_BUCKET: ${PROD_LOCAL_S3_BUCKET:-middleware-media-prod}
  S3_ACCESS_KEY: ${PROD_LOCAL_S3_ACCESS_KEY:-local-placeholder}
  S3_SECRET_KEY: ${PROD_LOCAL_S3_SECRET_KEY:-local-placeholder}
  S3_FORCE_PATH_STYLE: ${PROD_LOCAL_S3_FORCE_PATH_STYLE:-true}

services:
  app:
    image: middleware-app:${IMAGE_TAG:-local}
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment: *app-env
    ports:
      - "127.0.0.1:${PROD_LOCAL_APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  migrate:
    image: middleware-migrator:${IMAGE_TAG:-local}
    build:
      context: .
      target: migrator
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["pnpm", "prisma:migrate:deploy"]
    profiles: ["ops"]

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: middleware
      POSTGRES_USER: ${POSTGRES_USER:-middleware}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-middleware}
    volumes:
      - prod-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-middleware} -d middleware"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - prod-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      app:
        condition: service_healthy
    profiles: ["tunnel"]

volumes:
  prod-postgres-data:
  prod-redis-data:
